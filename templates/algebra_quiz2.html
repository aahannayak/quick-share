<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
<title>Algebra 1 Diagnostic - Interactive Quiz</title>
<meta charset="UTF-8">

<style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f7fa;
        margin: 0;
        padding: 0;
    }

    header {
        background: linear-gradient(90deg, #6a5acd, #48c6ef);
        color: white;
        padding: 25px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .topic-title {
        text-align: center;
        font-size: 26px;
        margin-top: 20px;
        color: #444;
    }

    .page {
        display: none;
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .question {
        background: white;
        padding: 18px;
        margin: 18px 0;
        border-radius: 12px;
        border-left: 8px solid #6a5acd;
        box-shadow: 0 3px 6px rgba(0,0,0,0.08);
    }

    .q-text {
        font-size: 18px;
        margin-bottom: 12px;
        color: #333;
    }

    .option {
        background: #eef2ff;
        padding: 10px;
        margin: 6px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #d0d7ff;
    }

    .option:hover {
        background: #dfe7ff;
    }

    .correct {
        background: #c8f7c5 !important;
        border-color: #8be28b !important;
    }

    .wrong {
        background: #f7c5c5 !important;
        border-color: #e28b8b !important;
    }

    .feedback {
        margin-top: 6px;
        font-weight: bold;
        font-size: 15px;
    }

    .nav-buttons {
        text-align: center;
        margin: 30px 0;
    }

    button {
        background: #6a5acd;
        color: white;
        border: none;
        padding: 12px 24px;
        margin: 10px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #5948c0;
    }

</style>
</head>

        {q:"Simplify: √(12x²)", options:["2x√3","4x√3","x√12","6x"], answer:0},
        {q:"Solve: 4x² - 64 = 0", options:["±4","±8","±16","0"], answer:0},
        {q:"Which is closest to √55?", options:["6","7","8","9"], answer:1},
        {q:"Simplify completely: √72 + √50",
         options:["6√2 + 5√2 = 11√2","3√8 + 5√2 = 8√2","6√2 + 25√2 = 31√2","12√2 + 5√2 = 17√2"], answer:0}
    ]
}
];

// -------------------------------
// RENDERING ENGINE
// -------------------------------
function renderTopic(index) {
    const container = document.getElementById("topic" + (index + 1));
    container.innerHTML = "";

    const topic = quiz[index];
    const title = document.createElement("h2");
    title.className = "topic-title";
    title.textContent = topic.topic;
    container.appendChild(title);

    topic.questions.forEach((qObj, qIndex) => {
        const qDiv = document.createElement("div");
        qDiv.className = "question";

        const qText = document.createElement("div");
        qText.className = "q-text";
        qText.textContent = (qIndex + 1) + ". " + qObj.q;
        qDiv.appendChild(qText);

        const feedback = document.createElement("div");
        feedback.className = "feedback";

        // -----------------------------------------
        // CASE 1: MULTIPLE-CHOICE QUESTIONS
        // -----------------------------------------
        if (qObj.options.length > 1) {
            qObj.options.forEach((opt, optIndex) => {
                const optDiv = document.createElement("div");
                optDiv.className = "option";
                optDiv.textContent = opt;

                optDiv.onclick = () => {
                    if (optIndex === qObj.answer) {
                        optDiv.classList.add("correct");
                        feedback.textContent = "Correct!";
                        feedback.style.color = "#2e8b57";
                    } else {
                        optDiv.classList.add("wrong");
                        feedback.textContent = "Wrong, try again";
                        feedback.style.color = "#b22222";
                    }
                };

                qDiv.appendChild(optDiv);
            });
        }

        // -----------------------------------------
        // CASE 2: SHORT-ANSWER QUESTIONS
        // -----------------------------------------
        else {
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Type your answer";
            input.style.padding = "10px";
            input.style.fontSize = "16px";
            input.style.width = "60%";
            input.style.borderRadius = "6px";
            input.style.border = "1px solid #ccc";
            input.style.marginBottom = "10px";

            const checkBtn = document.createElement("button");
            checkBtn.textContent = "Check";
            checkBtn.style.marginLeft = "10px";

            const correctAnswer = qObj.options[0].toString().trim().toLowerCase();

            function evaluate() {
                const userAnswer = input.value.trim().toLowerCase();

                if (userAnswer === correctAnswer) {
                    input.style.background = "#c8f7c5";
                    input.style.borderColor = "#8be28b";
                    feedback.textContent = "Correct!";
                    feedback.style.color = "#2e8b57";
                } else {
                    input.style.background = "#f7c5c5";
                    input.style.borderColor = "#e28b8b";
                    feedback.textContent = "Wrong, try again";
                    feedback.style.color = "#b22222";
                }
            }

            checkBtn.onclick = evaluate;

            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") evaluate();
            });

            qDiv.appendChild(input);
            qDiv.appendChild(checkBtn);
        }

        qDiv.appendChild(feedback);
        container.appendChild(qDiv);
    });
}
// -------------------------------
// PAGE NAVIGATION
// -------------------------------
let currentPage = 0;

function showPage(n) {
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    document.getElementById("topic" + (n + 1)).style.display = "block";
}

function nextPage() {
    if (currentPage < 7) currentPage++;
    showPage(currentPage);
}

function prevPage() {
    if (currentPage > 0) currentPage--;
    showPage(currentPage);
}

// -------------------------------
// INITIALIZE (after Parts 2-4 load quiz data)
// -------------------------------
function initializeQuiz() {
    for (let i = 0; i < quiz.length; i++) {
        renderTopic(i);
    }
    showPage(0);
}

initializeQuiz();

</script>
